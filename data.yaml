# Train/val/test sets as 1) dir: path/to/imgs, 2) file: path/to/imgs.txt, or 3) list: [path/to/imgs1, path/to/imgs2, ..]
# 默认使用仓库内相对路径，便于本地和服务器共用。
# 可见光图像放在 datasets/images/{train,val,test}。
# 配对红外图像需放在 datasets/image/{train,val,test}，并与可见光文件同名。
path: datasets
train: images/train
val: images/val
test: images/test
input_modality: multimodal
channel_order: vi_ir
pair_visible_dir: images
pair_infrared_dir: image
verify_pairs: true
strict_pairing: false
pair_check_samples: 100

# Classes
names:
  0: car
  1: bus
  2: van
  3: truck
  4: freight_car

# DroneVehicle数据集是由天津大学收集、标注的大型无人机航拍车辆数据集，包含28,439个RGB-红外图像对，可用于多模态训练任务。
# download：https://github.com/VisDrone/DroneVehicle
